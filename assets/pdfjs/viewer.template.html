<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>PDF Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; min-height: 100vh;
    background: #525659;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
  }
  /* Le canvas est centré et limité à la hauteur disponible (en laissant
     ~80px en bas pour le HUD pager). */
  #viewer {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 12px;
    padding-bottom: 96px;
    min-height: 100vh;
  }
  canvas {
    max-width: 100%;
    height: auto;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    border-radius: 2px;
  }
  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; font-size: 14px; line-height: 1.5;
  }
  #status .spinner {
    display: inline-block; width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #3DBE45;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status.error { color: #ff8a80; max-width: 80%; padding: 0 16px; }
  .hidden { display: none !important; }

  /* HUD pager — pill blanche flottante en bas, toujours visible */
  #pager {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 999px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
    z-index: 10;
    user-select: none;
  }
  #pager.visible { display: flex; }
  #pager button {
    width: 44px;
    height: 44px;
    border-radius: 22px;
    border: none;
    background: #3DBE45;
    color: #fff;
    font-size: 22px;
    line-height: 1;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    padding: 0;
  }
  #pager button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  #pager button:active:not(:disabled) { transform: scale(0.92); }
  #page-indicator {
    color: #1A2027;
    font-size: 13px;
    font-weight: 600;
    min-width: 56px;
    text-align: center;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<div id="viewer"></div>
<div id="status"><div class="spinner"></div><div id="status-text">Chargement du PDF…</div></div>

<div id="pager" role="navigation" aria-label="Navigation des pages">
  <button id="prev" type="button" aria-label="Page précédente">‹</button>
  <span id="page-indicator">1 / 1</span>
  <button id="next" type="button" aria-label="Page suivante">›</button>
</div>

<!-- PDF.js library (main thread) -->
<script>
/*__PDFJS_INLINE__*/
</script>

<!-- PDF.js worker code stored as text (read at runtime, wrapped in Blob URL) -->
<script type="text/plain" id="pdf-worker-code">
/*__PDFJS_WORKER_INLINE__*/
</script>

<!-- Main viewer logic -->
<script>
(function() {
  var statusEl = document.getElementById('status');
  var statusText = document.getElementById('status-text');
  var viewer = document.getElementById('viewer');
  var pagerEl = document.getElementById('pager');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var pageIndicator = document.getElementById('page-indicator');

  var pdfDoc = null;
  var currentPage = 1;
  var totalPages = 0;
  var isRendering = false;

  function showError(msg) {
    statusEl.classList.remove('hidden');
    statusEl.classList.add('error');
    statusEl.innerHTML = '<div>⚠️ ' + msg + '</div>';
  }

  function postRn(payload) {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      try { window.ReactNativeWebView.postMessage(JSON.stringify(payload)); } catch (e) {}
    }
  }

  function updateHud() {
    pageIndicator.textContent = currentPage + ' / ' + totalPages;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
  }

  function renderPage(pageNum) {
    if (!pdfDoc || isRendering) return Promise.resolve();
    isRendering = true;

    return pdfDoc.getPage(pageNum).then(function(page) {
      var dpr = window.devicePixelRatio || 1;
      var containerWidth = window.innerWidth - 24;
      var v1 = page.getViewport({ scale: 1 });
      var scale = containerWidth / v1.width;
      var vp = page.getViewport({ scale: scale * dpr });

      // On remplace le contenu du viewer (un seul canvas à la fois — gros gain
      // mémoire vs render de toutes les pages dans le DOM).
      viewer.innerHTML = '';
      var canvas = document.createElement('canvas');
      canvas.width = vp.width;
      canvas.height = vp.height;
      canvas.style.width = (vp.width / dpr) + 'px';
      canvas.style.height = (vp.height / dpr) + 'px';
      viewer.appendChild(canvas);

      return page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    }).then(function() {
      isRendering = false;
      // Remonte en haut pour montrer le début de la nouvelle page.
      window.scrollTo(0, 0);
    }).catch(function(err) {
      isRendering = false;
      throw err;
    });
  }

  if (typeof pdfjsLib === 'undefined') {
    showError('Librairie PDF non chargée.');
    return;
  }

  try {
    var workerCode = document.getElementById('pdf-worker-code').textContent;
    var workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(workerBlob);
  } catch (e) {
    showError('Impossible de démarrer le worker PDF.');
    return;
  }

  // URL du PDF passée via hash (#url=...) — plus tolérant que query pour les
  // URLs longues ou avec caractères encodés dans signed URLs.
  var params = new URLSearchParams(window.location.hash.slice(1));
  var pdfUrl = params.get('url');
  if (!pdfUrl && window.__PDF_URL__) pdfUrl = window.__PDF_URL__;

  if (!pdfUrl) {
    showError('URL du PDF manquante.');
    return;
  }

  // Event listeners pour la navigation
  prevBtn.addEventListener('click', function() {
    if (currentPage > 1 && !isRendering) {
      currentPage--;
      updateHud();
      renderPage(currentPage).catch(function(err) {
        postRn({ type: 'error', message: String(err && err.message || err) });
      });
    }
  });

  nextBtn.addEventListener('click', function() {
    if (currentPage < totalPages && !isRendering) {
      currentPage++;
      updateHud();
      renderPage(currentPage).catch(function(err) {
        postRn({ type: 'error', message: String(err && err.message || err) });
      });
    }
  });

  // Support des flèches clavier (bonus desktop / tablette avec clavier)
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') prevBtn.click();
    else if (e.key === 'ArrowRight') nextBtn.click();
  });

  statusText.textContent = 'Téléchargement du document…';

  pdfjsLib.getDocument({ url: pdfUrl, withCredentials: false }).promise
    .then(function(pdf) {
      pdfDoc = pdf;
      totalPages = pdf.numPages;
      currentPage = 1;
      statusEl.classList.add('hidden');
      pagerEl.classList.add('visible');
      updateHud();
      return renderPage(currentPage);
    })
    .then(function() {
      postRn({ type: 'rendered', pages: totalPages });
    })
    .catch(function(err) {
      var msg = (err && err.message) ? err.message : 'Erreur inconnue.';
      showError('Impossible de charger le PDF.<br><small>' + msg + '</small>');
      postRn({ type: 'error', message: String(msg) });
    });
})();
</script>
</body>
</html>
